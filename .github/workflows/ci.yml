# ============================================================
#  Secure DevOps CI/CD Pipeline — Forensic-Grade
#  Course: Computer Forensics and Incident Response
#  Topic:  Best practices for secure DevOps in the context
#          of cyber forensics
#
#  Pipeline jobs (in execution order):
#    Phase 1 · CodeQL Static Analysis
#    Phase 2 · Dependency Audit (npm audit)
#    Phase 3 · Build & SBOM Generation
#    Phase 4 · Artifact Signing (Sigstore / cosign)
#    Phase 5 · SLSA Level-3 Provenance
#    Phase 6 · Forensic Audit Summary
#
#  Security controls active at pipeline level:
#    - OIDC federation: id-token: write per job, no stored secrets
#    - Least-privilege: permissions: {} globally, granted per job
#    - Secret Scanning + Push Protection: enabled in repo Settings
#    - Dependabot: configured in .github/dependabot.yml
# ============================================================

name: Secure CI/CD Pipeline — Forensic

# ── Triggers ──────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual run for forensic re-verification
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger (logged in audit summary)"
        required: false
        default: "manual verification"

# ── Global: deny everything — each job grants only what it needs ──
# This implements least-privilege across the entire pipeline.
# Forensic value: no job can escalate permissions beyond what it declares.
permissions: {}

# ── Prevent redundant concurrent runs on the same branch ──
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Shared environment ────────────────────────────────────
env:
  NODE_VERSION: "20"
  ARTIFACT_NAME: "react-app-dist"
  # Path to the web application within the monorepo
  APP_DIR: "web-app"

# ==========================================================
# PHASE 1 — CodeQL Static Analysis
#
# Forensic value: detects vulnerabilities BEFORE they ship.
# The SARIF report uploaded to GitHub Security tab is a
# permanent, timestamped record of code health at each commit.
# During post-incident analysis, investigators can query:
# "Was this vulnerability present and detectable at build time?"
# ==========================================================
jobs:
  codeql:
    name: "Phase 1 · CodeQL Static Analysis"
    runs-on: ubuntu-latest

    permissions:
      contents: read          # checkout
      security-events: write  # upload SARIF to Security tab
      actions: read           # required by CodeQL internals

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history — CodeQL uses git history for dataflow analysis
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # security-extended only — security-and-quality causes
          # timeouts on GitHub free runners due to query volume
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
          upload: true
        timeout-minutes: 30

  # ==========================================================
  # PHASE 2 — Dependency Audit
  #
  # Forensic value: npm audit JSON report is a timestamped record
  # of all known-vulnerable dependencies at build time.
  # During supply-chain incident reconstruction, this answers:
  # "Was the team aware of CVE-XXXX when they shipped this build?"
  # Dependabot PRs (in dependabot.yml) extend this with an
  # automated, actor-attributed change log for every dep update.
  # ==========================================================
  dependency-audit:
    name: "Phase 2 · Dependency Audit"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        # npm ci enforces exact versions from package-lock.json —
        # essential for reproducible, forensically verifiable builds
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ env.APP_DIR }}
        # --audit-level=high: pipeline fails only on HIGH/CRITICAL CVEs
        # continue-on-error keeps the report upload step reachable
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Generate detailed audit report (JSON)
        working-directory: ${{ env.APP_DIR }}
        run: npm audit --json > ../npm-audit-report.json || true

      - name: Upload audit report as forensic artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          # 90-day retention aligns with typical incident SLA windows
          retention-days: 90

  # ==========================================================
  # PHASE 3 — Build & SBOM Generation
  #
  # Forensic value: the SBOM (Software Bill of Materials) is a
  # machine-readable manifest of every package in the shipped
  # artifact. Two formats are generated:
  #   - SPDX JSON  (ISO/IEC 5962 standard)
  #   - CycloneDX JSON (OWASP standard)
  # During a supply-chain incident, the SBOM immediately answers:
  # "Was vulnerable package X present in this specific build?"
  # Both formats are uploaded as 90-day retained artifacts.
  # ==========================================================
  build:
    name: "Phase 3 · Build & SBOM"
    runs-on: ubuntu-latest
    needs: [codeql, dependency-audit]

    permissions:
      contents: read

    outputs:
      # SHA-256 of the build archive — passed to SLSA provenance job
      artifact-hash: ${{ steps.hash.outputs.hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Build application
        working-directory: ${{ env.APP_DIR }}
        run: npm run build
        env:
          # Embed forensic build metadata into the shipped artifact
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_REF: ${{ github.ref_name }}
          VITE_BUILD_ACTOR: ${{ github.actor }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
          VITE_WORKFLOW_RUN_ID: ${{ github.run_id }}

      - name: Create distributable archive
        # Single tar.gz gives one artifact to hash, sign, and attest.
        run: |
          tar -czf ${{ env.ARTIFACT_NAME }}.tar.gz -C ${{ env.APP_DIR }}/dist .
          echo "Archive size: $(ls -lh ${{ env.ARTIFACT_NAME }}.tar.gz | awk '{print $5}')"

      - name: Compute SHA-256 hash
        id: hash
        run: |
          HASH=$(sha256sum ${{ env.ARTIFACT_NAME }}.tar.gz | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "### Build Artifact Hash" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "SHA-256: $HASH" >> "$GITHUB_STEP_SUMMARY"
          echo "File:    ${{ env.ARTIFACT_NAME }}.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      # ── SBOM — SPDX format (ISO/IEC 5962) ────────────────
      - name: Generate SBOM — SPDX JSON
        uses: anchore/sbom-action@v0.20.2
        with:
          path: ${{ env.APP_DIR }}
          artifact-name: sbom.spdx.json
          output-file: sbom.spdx.json
          format: spdx-json

      # ── SBOM — CycloneDX format (OWASP) ──────────────────
      - name: Generate SBOM — CycloneDX JSON
        uses: anchore/sbom-action@v0.20.2
        with:
          path: ${{ env.APP_DIR }}
          artifact-name: sbom.cyclonedx.json
          output-file: sbom.cyclonedx.json
          format: cyclonedx-json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
          retention-days: 90

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90

  # ==========================================================
  # PHASE 4 — Artifact Signing (Sigstore / cosign)
  #
  # Forensic value: keyless signing via OIDC means no private key
  # is ever stored anywhere. cosign exchanges the GitHub OIDC token
  # with Sigstore's Fulcio CA for a short-lived certificate, then
  # records the signature in Rekor — a public, append-only
  # transparency log. This provides:
  #   - Tamper evidence: any modification of the artifact is detected
  #   - Attribution: signature is bound to repo + workflow + SHA
  #   - Long-term verifiability: Rekor entry persists indefinitely
  # After an incident, any investigator can run cosign verify-blob
  # to confirm artifact integrity without trusting the pipeline.
  # ==========================================================
  sign-artifact:
    name: "Phase 4 · Sigstore Artifact Signing"
    runs-on: ubuntu-latest
    needs: [build]
    # Signing only on pushes to main — not on PRs (forks have no OIDC)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      # REQUIRED: cosign exchanges this token with Fulcio CA
      # to obtain a short-lived signing certificate bound to
      # the GitHub Actions workflow identity (OIDC federation)
      id-token: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}

      - name: Install cosign (v3 — keyless, OIDC-native)
        uses: sigstore/cosign-installer@v3.9.1

      - name: Verify cosign installation
        run: cosign version

      - name: Sign artifact (keyless / Sigstore Rekor)
        run: |
          cosign sign-blob \
            --yes \
            --bundle artifact.bundle \
            ${{ env.ARTIFACT_NAME }}.tar.gz

          echo "### Cosign Signature" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact signed. Entry recorded in Sigstore Rekor transparency log." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Forensic verification command:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "cosign verify-blob \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --bundle artifact.bundle \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}' \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  ${{ env.ARTIFACT_NAME }}.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cosign bundle as forensic artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosign-bundle
          path: artifact.bundle
          retention-days: 90

  # ==========================================================
  # PHASE 5 — SLSA Level-3 Provenance
  #
  # Forensic value: SLSA provenance is a non-forgeable, signed
  # attestation that binds the artifact hash to:
  #   - the exact source commit (git SHA)
  #   - the GitHub Actions workflow that executed the build
  #   - the runner environment and build parameters
  #   - the actor who triggered the pipeline
  # Stored as .intoto.jsonl — the chain-of-custody document.
  # Verifiable with slsa-verifier independently of GitHub.
  # Level 3: provenance is generated in an isolated job that
  # the build job itself cannot tamper with.
  # ==========================================================
  provenance:
    name: "Phase 5 · SLSA L3 Provenance"
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      actions: read    # detect GitHub Actions environment
      id-token: write  # sign provenance with OIDC token
      contents: write  # upload provenance to workflow artifacts

    # Must be pinned to exact version tag — required by slsa-verifier
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      # base64-subjects must encode "sha256:<HASH>  <filename>"
      # We pass the hash as both subject identifier and filename placeholder
      base64-subjects: "${{ needs.build.outputs.artifact-hash }}  react-app-dist.tar.gz"
      upload-assets: false

  # ==========================================================
  # PHASE 6 — Forensic Audit Summary
  #
  # Forensic value: aggregates all pipeline security events into
  # a structured JSON record (forensic-audit-event.json) and a
  # human-readable GitHub Step Summary. The JSON record is
  # designed to be ingested by a SIEM or the forensic dashboard.
  # Captures: pipeline identity, source attribution, artifact
  # integrity hash, and status of all security controls.
  # if: always() ensures audit runs even on partial failure —
  # an incomplete audit trail is itself a forensic finding.
  # ==========================================================
  forensic-audit:
    name: "Phase 6 · Forensic Audit Summary"
    runs-on: ubuntu-latest
    needs: [codeql, dependency-audit, build, sign-artifact]
    if: always()

    permissions:
      contents: read

    steps:
      - name: Build structured forensic audit record (JSON)
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > forensic-audit-event.json << EOF
          {
            "schema_version": "1.0",
            "event_type": "ci_pipeline_run",
            "timestamp": "${TIMESTAMP}",
            "pipeline": {
              "workflow": "${{ github.workflow }}",
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "run_attempt": "${{ github.run_attempt }}"
            },
            "source": {
              "repository": "${{ github.repository }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "base_sha": "${{ github.event.before }}"
            },
            "actor": {
              "github_actor": "${{ github.actor }}",
              "triggering_actor": "${{ github.triggering_actor }}",
              "event_name": "${{ github.event_name }}"
            },
            "artifact": {
              "name": "${{ env.ARTIFACT_NAME }}.tar.gz",
              "sha256": "${{ needs.build.outputs.artifact-hash }}"
            },
            "security_controls": {
              "phase_1_codeql": "${{ needs.codeql.result }}",
              "phase_2_dependency_audit": "${{ needs.dependency-audit.result }}",
              "phase_3_sbom_generated": "spdx-json + cyclonedx-json",
              "phase_4_cosign_signed": "${{ needs.sign-artifact.result }}",
              "phase_5_slsa_provenance": "level-3",
              "oidc_federation": "enabled",
              "hardcoded_secrets": "none",
              "secret_scanning": "enabled-in-repo-settings"
            },
            "retained_artifacts": [
              "npm-audit-report",
              "sbom-files",
              "${{ env.ARTIFACT_NAME }}",
              "cosign-bundle",
              "forensic-audit-event"
            ],
            "retention_policy_days": 90,
            "forensic_note": "All artifacts retained 90 days. Cosign bundle verifiable via Sigstore Rekor transparency log independently of this repository."
          }
          EOF

      - name: Upload forensic audit record
        uses: actions/upload-artifact@v4
        with:
          name: forensic-audit-event
          path: forensic-audit-event.json
          retention-days: 90

      - name: Write human-readable Job Summary
        run: |
          echo "# 🔐 Forensic Pipeline Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Run Identity" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Run ID** | \`${{ github.run_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit SHA** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Timestamp** | $(date -u) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Security Controls" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase | Control | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 1 | CodeQL Static Analysis | ${{ needs.codeql.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 2 | Dependency Audit (npm) | ${{ needs.dependency-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 3 | SBOM Generated | ✅ SPDX + CycloneDX |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 4 | Cosign Signature | ${{ needs.sign-artifact.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase 5 | SLSA Provenance | ✅ Level 3 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Global  | OIDC (no stored secrets) | ✅ Enforced |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Global  | Secret Scanning | ✅ Repo Settings |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Artifact Integrity" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | SHA-256 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`${{ env.ARTIFACT_NAME }}.tar.gz\` | \`${{ needs.build.outputs.artifact-hash }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Retained Forensic Artifacts (90 days)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | Purpose |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`npm-audit-report\` | Dependency vulnerability scan at build time |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`sbom-files\` | SPDX + CycloneDX software bill of materials |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`${{ env.ARTIFACT_NAME }}\` | Signed build archive |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`cosign-bundle\` | Sigstore signature + Rekor entry |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`forensic-audit-event\` | Structured JSON audit record (SIEM-ready) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 🔍 Forensic Artifact Verification" >> "$GITHUB_STEP_SUMMARY"
          echo "Download \`cosign-bundle\` and the build archive, then run:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "cosign verify-blob \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --bundle artifact.bundle \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}' \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  ${{ env.ARTIFACT_NAME }}.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
