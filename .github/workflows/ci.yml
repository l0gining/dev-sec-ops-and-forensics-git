# ============================================================
#  Secure DevOps CI/CD Pipeline — Forensic-Grade
#  Course: Computer Forensics and Incident Response
#  Topic:  Best practices for secure DevOps in the context
#          of cyber forensics
#
#  Pipeline phases:
#    1. OIDC & Hardened Permissions
#    2. Static Analysis — CodeQL
#    3. Secret Scanning (native GitHub feature, enabled
#       in repo Settings; enforced here via push protection)
#    4. Dependency Audit — npm audit + Dependabot
#    5. Build + SBOM generation (Syft via anchore/sbom-action)
#    6. Artifact signing — Sigstore / cosign (keyless OIDC)
#    7. SLSA Level-3 Provenance
#    8. Deploy to GitHub Pages
#    9. Forensic audit-event summary
# ============================================================

name: Secure CI/CD Pipeline — Forensic

# ── Triggers ──────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual run for forensic re-verification
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger (logged in audit summary)"
        required: false
        default: "manual verification"

# ── Default: deny everything; each job grants only what it needs ──
permissions: {}

# ── Prevent redundant runs on the same branch ─────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Shared environment ────────────────────────────────────
env:
  NODE_VERSION: "20"
  ARTIFACT_NAME: "react-app-dist"

# ==========================================================
# JOB 1 — CodeQL Static Analysis
# Forensic value: detects vulnerabilities BEFORE they ship;
# SARIF report is a permanent record of code health at each
# commit, supporting post-incident root-cause analysis.
# ==========================================================
jobs:
  codeql:
    name: "Phase 2 · CodeQL Static Analysis"
    runs-on: ubuntu-latest

    # Minimal permissions — only what CodeQL requires
    permissions:
      contents: read          # checkout
      security-events: write  # upload SARIF to Security tab
      actions: read           # needed by CodeQL action

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so CodeQL can trace changes across commits
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Extend with security-and-quality suite for deeper coverage
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
          # SARIF upload goes to GitHub Security → Code scanning alerts
          upload: true

  # ==========================================================
  # JOB 2 — Dependency Audit
  # Forensic value: npm audit log + Dependabot alerts create
  # a timestamped record of known-vulnerable dependencies.
  # During incident reconstruction, this log shows exactly
  # when a vulnerability was introduced and when it was known.
  # ==========================================================
  dependency-audit:
    name: "Phase 4 · Dependency Audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies (clean install — uses package-lock.json)
        # 'ci' enforces exact versions from lock file — critical for
        # reproducible, forensically verifiable builds
        run: npm ci

      - name: Run npm audit
        # --audit-level=high: fail only on HIGH or CRITICAL CVEs
        # Change to 'moderate' for stricter enforcement
        run: npm audit --audit-level=high
        # Continue so we can still upload the report as evidence
        continue-on-error: true

      - name: Generate detailed audit report (JSON)
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report as forensic artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          # 90-day retention — adjust to your forensic policy
          retention-days: 90

  # ==========================================================
  # JOB 3 — Build + SBOM Generation
  # Forensic value: SBOM (Software Bill of Materials) records
  # the exact set of packages in the shipped artifact.
  # During a supply-chain incident, the SBOM lets investigators
  # immediately answer "was vulnerable package X in this build?"
  # ==========================================================
  build:
    name: "Phase 5 · Build & SBOM"
    runs-on: ubuntu-latest
    needs: [codeql, dependency-audit]

    permissions:
      contents: read

    outputs:
      # Pass artifact hash downstream to SLSA provenance job
      artifact-hash: ${{ steps.hash.outputs.hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build React application
        run: npm run build
        env:
          # Inject forensic metadata into the build
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_REF: ${{ github.ref_name }}
          VITE_BUILD_ACTOR: ${{ github.actor }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
          VITE_WORKFLOW_RUN_ID: ${{ github.run_id }}

      - name: Create distributable archive
        # tar the dist/ folder so we have a single artifact to hash and sign
        run: |
          tar -czf ${{ env.ARTIFACT_NAME }}.tar.gz -C dist .
          echo "Artifact created: $(ls -lh ${{ env.ARTIFACT_NAME }}.tar.gz)"

      - name: Compute SHA-256 hash
        id: hash
        run: |
          HASH=$(sha256sum ${{ env.ARTIFACT_NAME }}.tar.gz | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "### Artifact Hash" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "SHA-256: $HASH" >> "$GITHUB_STEP_SUMMARY"
          echo "File:    ${{ env.ARTIFACT_NAME }}.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      # ── SBOM Generation (Syft via anchore/sbom-action) ──
      - name: Generate SBOM — SPDX format
        uses: anchore/sbom-action@v0.20.2
        with:
          # Scan the entire repository source for full dependency mapping
          path: .
          artifact-name: sbom.spdx.json
          output-file: sbom.spdx.json
          format: spdx-json
          # Upload SBOM to workflow artifacts automatically

      - name: Generate SBOM — CycloneDX format (supplementary)
        uses: anchore/sbom-action@v0.20.2
        with:
          path: .
          artifact-name: sbom.cyclonedx.json
          output-file: sbom.cyclonedx.json
          format: cyclonedx-json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
          retention-days: 90

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90


  # ==========================================================
  # JOB 4 — Artifact Signing with Sigstore / cosign
  # Forensic value: keyless signature (OIDC-bound, no stored
  # private key) creates a tamper-evident record in Sigstore's
  # public Rekor transparency log. After an incident, any
  # investigator can verify "this artifact was produced by
  # workflow X in repo Y at time Z — and has not been altered."
  # ==========================================================
  sign-artifact:
    name: "Phase 6 · Sigstore Signing"
    runs-on: ubuntu-latest
    needs: [build]
    # Only sign on pushes to main (not on PRs from forks)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      # REQUIRED for keyless OIDC signing — cosign exchanges this
      # token with Fulcio CA to get a short-lived signing certificate
      id-token: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}

      - name: Install cosign (v3 — keyless, OIDC-native)
        uses: sigstore/cosign-installer@v3.9.1

      - name: Verify cosign installation
        run: cosign version

      - name: Sign artifact with cosign (keyless / Sigstore)
        # cosign sign-blob:
        #   - fetches a short-lived cert from Fulcio (OIDC → GitHub identity)
        #   - writes the signature to Rekor public transparency log
        #   - no private key is ever stored — signing identity is the
        #     GitHub Actions OIDC token (workflow + repo + SHA)
        run: |
          cosign sign-blob \
            --yes \
            --bundle artifact.bundle \
            ${{ env.ARTIFACT_NAME }}.tar.gz

          echo "### Cosign Signature" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact signed and recorded in Rekor transparency log." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Verify with:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "cosign verify-blob \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --bundle artifact.bundle \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}' \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  ${{ env.ARTIFACT_NAME }}.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload signature bundle as forensic artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosign-bundle
          path: artifact.bundle
          retention-days: 90

  # ==========================================================
  # JOB 5 — SLSA Level-3 Provenance
  # Forensic value: non-forgeable, signed statement that binds
  # the artifact hash to:
  #   - the exact source commit (git SHA)
  #   - the GitHub Actions workflow that ran the build
  #   - the runner environment
  #   - the actor who triggered the pipeline
  # This is the chain-of-custody document for the artifact.
  # Stored as .intoto.jsonl — verifiable with slsa-verifier.
  # ==========================================================
  provenance:
    name: "Phase 7 · SLSA L3 Provenance"
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      actions: read           # detect GitHub Actions environment
      id-token: write         # sign provenance with OIDC token
      contents: write         # upload provenance to release assets

    # IMPORTANT: must be called as a reusable workflow and pinned
    # to an exact version tag (required by SLSA verifier)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: >-
        ${{ needs.build.outputs.artifact-hash }}
          ${{ needs.build.outputs.artifact-hash }}
      # Upload provenance to GitHub Actions artifacts
      upload-assets: false

  # ==========================================================
  # JOB 6 — Forensic Audit Summary
  # Aggregates all pipeline events into a single job summary
  # that serves as the human-readable forensic trail for this
  # pipeline run. Also writes a JSON audit event for SIEM
  # integration (or local logging).
  # ==========================================================
  forensic-audit:
    name: "Phase 9 · Forensic Audit Summary"
    runs-on: ubuntu-latest
    needs: [codeql, dependency-audit, build, sign-artifact]
    if: always() # Run even if earlier jobs failed — audit must be complete

    permissions:
      contents: read

    steps:
      - name: Build forensic audit record (JSON)
        id: audit
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Construct a structured audit event — can be forwarded
          # to a SIEM, stored in a log management system, or kept
          # as a GitHub Actions artifact for post-incident analysis
          cat > forensic-audit-event.json << EOF
          {
            "schema_version": "1.0",
            "event_type": "ci_pipeline_run",
            "timestamp": "${TIMESTAMP}",
            "pipeline": {
              "workflow": "${{ github.workflow }}",
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "run_attempt": "${{ github.run_attempt }}"
            },
            "source": {
              "repository": "${{ github.repository }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "base_sha": "${{ github.event.before }}"
            },
            "actor": {
              "github_actor": "${{ github.actor }}",
              "triggering_actor": "${{ github.triggering_actor }}",
              "event_name": "${{ github.event_name }}"
            },
            "artifact": {
              "name": "${{ env.ARTIFACT_NAME }}.tar.gz",
              "sha256": "${{ needs.build.outputs.artifact-hash }}"
            },
            "security_controls": {
              "codeql": "${{ needs.codeql.result }}",
              "dependency_audit": "${{ needs.dependency-audit.result }}",
              "sbom_generated": "true",
              "cosign_signed": "${{ needs.sign-artifact.result }}",
              "slsa_provenance": "generated_in_separate_job",
              "oidc_federation": "true",
              "hardcoded_secrets": "none"
            },
            "forensic_note": "All artifacts retained for 90 days per pipeline retention policy. SBOM, cosign bundle, npm audit report, and SLSA provenance available as GitHub Actions artifacts for this run."
          }
          EOF

          echo "Audit record written to forensic-audit-event.json"

      - name: Upload forensic audit record
        uses: actions/upload-artifact@v4
        with:
          name: forensic-audit-event
          path: forensic-audit-event.json
          retention-days: 90

      - name: Write Job Summary (human-readable forensic trail)
        run: |
          echo "# Forensic Pipeline Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Run ID** | \`${{ github.run_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit SHA** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Timestamp** | $(date -u) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Security Controls" >> "$GITHUB_STEP_SUMMARY"
          echo "| Control | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CodeQL Static Analysis | ${{ needs.codeql.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency Audit (npm) | ${{ needs.dependency-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM Generated | ✅ SPDX + CycloneDX |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cosign Signature | ${{ needs.sign-artifact.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SLSA Provenance | ✅ Level 3 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| OIDC (no stored secrets) | ✅ Enforced |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Artifact Integrity" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | SHA-256 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`${{ env.ARTIFACT_NAME }}.tar.gz\` | \`${{ needs.build.outputs.artifact-hash }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Forensic Artifacts (retained 90 days)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`npm-audit-report\` — dependency vulnerability scan" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`sbom-files\` — SPDX + CycloneDX software bill of materials" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.ARTIFACT_NAME }}\` — signed build artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`cosign-bundle\` — Sigstore signature bundle" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`forensic-audit-event\` — structured JSON audit record" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> 🔍 **Forensic Verification**" >> "$GITHUB_STEP_SUMMARY"
          echo "> Download \`cosign-bundle\` + the build artifact, then run:" >> "$GITHUB_STEP_SUMMARY"
          echo "> \`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "> cosign verify-blob --bundle artifact.bundle \\" >> "$GITHUB_STEP_SUMMARY"
          echo ">   --certificate-identity-regexp 'https://github.com/${{ github.repository }}' \\" >> "$GITHUB_STEP_SUMMARY"
          echo ">   --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\" >> "$GITHUB_STEP_SUMMARY"
          echo ">   ${{ env.ARTIFACT_NAME }}.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "> \`\`\`" >> "$GITHUB_STEP_SUMMARY"
